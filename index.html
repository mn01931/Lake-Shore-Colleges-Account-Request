<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lake Shore Colleges - Student Account Request</title>

<style>
*{box-sizing:border-box}
body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#f4f6f8}

header{background:#007145;color:white;padding:18px;text-align:center}
header h1{margin:0;font-size:26px}
header p{margin:5px 0 0}

.container{max-width:900px;margin:30px auto;background:white;padding:30px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}

h2{margin-top:0}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.form-full{grid-column:1 / -1}

label{display:block;margin-top:10px;font-weight:bold}

input,select{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px
}

button{
margin-top:20px;
padding:14px;
background:#007145;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
width:100%
}

button:hover{background:#005c38}

.hidden{display:none}

footer{text-align:center;margin:30px;color:#777;font-size:14px}

/* Mobile */
@media (max-width:768px){
.form-grid{grid-template-columns:1fr}
.container{margin:15px;padding:20px}
}
</style>
</head>

<body>

<header>
<h1>Lake Shore Colleges</h1>
<p>Student Google Workspace Account Request</p>
</header>

<div class="container">
<h2>Request Student Account</h2>
<p>Fill out the form below to generate a student Google Workspace account.</p>

<form id="accountForm" class="form-grid">

<div>
<label>First Name</label>
<input type="text" name="firstName" required>
</div>

<div>
<label>Last Name</label>
<input type="text" name="lastName" required>
</div>

<div class="form-full">
<label>Student Type</label>
<select name="studentType" id="studentType" required>
<option value="">Select</option>
<option value="Basic Education">Basic Education</option>
<option value="Senior High School">Senior High School</option>
<option value="College">College</option>
</select>
</div>

<div id="gradeSection" class="hidden form-full">
<label>Grade Level</label>
<select name="gradeLevel" id="gradeLevel">
<option value="">Select</option>
<option>Grade 7</option>
<option>Grade 8</option>
<option>Grade 9</option>
<option>Grade 10</option>
<option>Grade 11</option>
<option>Grade 12</option>
</select>
</div>

<div id="collegeSection" class="hidden form-full">
<label>College Program</label>
<select name="program" id="program">
<option value="">Select</option>
<option>BSPSYCH</option>
<option>BSCRIM</option>
<option>BSREM</option>
<option>BSA</option>
<option>BSMA</option>
</select>

<label>Student Number</label>
<input type="text" name="studentNumber" id="studentNumber">
</div>

<div class="form-full">
<label>Personal Email</label>
<input type="email" name="personalEmail" required>
</div>

<div class="form-full">
<button type="submit">Generate Student Account</button>
</div>

</form>
</div>

<footer>
<p>ICT Department | Lake Shore Colleges</p>
</footer>

<script>

const studentType = document.getElementById('studentType');
const gradeSection = document.getElementById('gradeSection');
const collegeSection = document.getElementById('collegeSection');
const gradeLevel = document.getElementById('gradeLevel');

studentType.addEventListener('change', function(){

const value = this.value;

if(value === 'Basic Education'){

 gradeSection.classList.remove('hidden');
 collegeSection.classList.add('hidden');

 gradeLevel.innerHTML = `
 <option value="">Select</option>
 <option>Grade 7</option>
 <option>Grade 8</option>
 <option>Grade 9</option>
 <option>Grade 10</option>
 `;

}

else if(value === 'Senior High School'){

 gradeSection.classList.remove('hidden');
 collegeSection.classList.add('hidden');

 gradeLevel.innerHTML = `
 <option value="">Select</option>
 <option>Grade 11</option>
 <option>Grade 12</option>
 `;

}

else if(value === 'College'){

 collegeSection.classList.remove('hidden');
 gradeSection.classList.add('hidden');

}

else{

 gradeSection.classList.add('hidden');
 collegeSection.classList.add('hidden');

}

});

/* FORM SUBMIT */
const form = document.getElementById('accountForm');

form.addEventListener('submit', async function(e){

 e.preventDefault();

 const formData = new FormData(form);
 const data = Object.fromEntries(formData.entries());

 try{

 const response = await fetch("https://script.google.com/macros/s/AKfycbwVFYCg1OvQH0psD4o4NpV7v08_vfExMC2Ibu5Me3w-qICt4xeH4Q7tIMbqufULNnF0/exec",{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify(data)
 });

 const result = await response.text();

 alert("Student account request submitted successfully.");
 form.reset();

 gradeSection.classList.add('hidden');
 collegeSection.classList.add('hidden');

 }
 catch(error){

 alert("Submission failed. Please contact ICT.");
 console.error(error);

 }

});

</script>

</body>
</html>
